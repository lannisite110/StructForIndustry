name: contracts

on:
  push:
    branches: [main, master]
    paths:
      - "core/contracts/**"
      - "core/plugin-host/**"
      - "core/core-bus/**"
      - "core/hal-rs/**"
      - "core/math-kernel/**"
      - "plugins/vision-2d/**"
      - "domains/industrial-inspection/**"
      - "plugins/ai-infer/**"
      - "tools/fake-plugin/**"
      - "tools/sfi-cli/**"
      - "tools/scripts/**"
      - "Cargo.toml"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "core/contracts/**"
      - "core/plugin-host/**"
      - "core/core-bus/**"
      - "core/hal-rs/**"
      - "core/math-kernel/**"
      - "plugins/vision-2d/**"
      - "domains/industrial-inspection/**"
      - "plugins/ai-infer/**"
      - "tools/fake-plugin/**"
      - "tools/sfi-cli/**"
      - "tools/scripts/**"
      - "Cargo.toml"
      - ".github/workflows/contracts.yml"

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y capnproto

      - name: Validate schemas
        run: ./core/contracts/scripts/validate-schemas.sh

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo test (workspace)
        run: cargo test --workspace --all-targets

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: 1080p bench smoke
        run: ./tools/scripts/bench-1080p.sh

      - name: 1080p bench report
        run: |
          chmod +x tools/scripts/bench-1080p-report.sh
          ./tools/scripts/bench-1080p-report.sh bench-1080p.json

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Zig build hal-rs
        run: |
          cd core/hal-rs
          zig build

  julia-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - name: Julia project checks
        run: ./tools/scripts/julia-check.sh

      - uses: dtolnay/rust-toolchain@stable

      - name: Julia shm E2E
        run: ./tools/scripts/shm-julia-e2e.sh
