name: contracts

on:
  push:
    branches: [main, master]
    paths:
      - "core/contracts/**"
      - "core/plugin-host/**"
      - "core/core-bus/**"
      - "core/hal-rs/**"
      - "core/math-kernel/**"
      - "plugins/vision-2d/**"
      - "domains/industrial-inspection/**"
      - "plugins/ai-infer/**"
      - "tools/fake-plugin/**"
      - "tools/sfi-cli/**"
      - "tools/scripts/**"
      - "Cargo.toml"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "core/contracts/**"
      - "core/plugin-host/**"
      - "core/core-bus/**"
      - "core/hal-rs/**"
      - "core/math-kernel/**"
      - "plugins/vision-2d/**"
      - "domains/industrial-inspection/**"
      - "plugins/ai-infer/**"
      - "tools/fake-plugin/**"
      - "tools/sfi-cli/**"
      - "tools/scripts/**"
      - "Cargo.toml"
      - ".github/workflows/contracts.yml"

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y capnproto

      - name: Validate schemas
        run: ./core/contracts/scripts/validate-schemas.sh

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo test (workspace)
        run: cargo test --workspace --all-targets

      - name: Cargo fmt check
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: hal-ext crates fmt + clippy
        run: |
          for c in line-frame line-publisher plc-trigger v4l2-capture gige-capture \
                   modbus-plc-trigger opcua-plc-trigger mindvision-capture; do
            mf="domains/industrial-inspection/hal-ext/$c/Cargo.toml"
            cargo fmt --manifest-path "$mf" -- --check
            cargo clippy --manifest-path "$mf" --all-targets -- -D warnings
          done

      - name: ai-infer (separate workspace) fmt + clippy + test
        run: |
          cargo fmt --manifest-path plugins/ai-infer/Cargo.toml -- --check
          cargo clippy --manifest-path plugins/ai-infer/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path plugins/ai-infer/Cargo.toml

      - name: 1080p bench smoke
        run: ./tools/scripts/bench-1080p.sh

      - name: 1080p bench report
        run: |
          chmod +x tools/scripts/bench-1080p-report.sh tools/scripts/ai-infer-e2e.sh
          ./tools/scripts/bench-1080p-report.sh bench-1080p.json

      - name: ai-infer E2E
        run: ./tools/scripts/ai-infer-e2e.sh

      - name: v4l2 capture E2E
        run: |
          sudo apt-get install -y v4l2loopback-dkms ffmpeg
          chmod +x tools/scripts/setup-v4l2loopback.sh \
            tools/scripts/v4l2-capture-e2e.sh \
            tools/scripts/v4l2-trigger-e2e.sh \
            tools/scripts/gige-capture-e2e.sh \
            tools/scripts/modbus-plc-e2e.sh \
            tools/scripts/modbus-v4l2-e2e.sh \
            tools/scripts/opcua-plc-e2e.sh \
            tools/scripts/onnx-infer-e2e.sh
          tools/scripts/setup-v4l2loopback.sh
          SFI_V4L2_DEVICE=/dev/video42 ./tools/scripts/v4l2-capture-e2e.sh
          SFI_V4L2_DEVICE=/dev/video42 ./tools/scripts/v4l2-trigger-e2e.sh

      - name: gige + modbus E2E
        run: |
          chmod +x tools/scripts/mindvision-capture-e2e.sh
          ./tools/scripts/gige-capture-e2e.sh
          ./tools/scripts/mindvision-capture-e2e.sh
          ./tools/scripts/modbus-plc-e2e.sh
          ./tools/scripts/opcua-plc-e2e.sh
          SFI_V4L2_DEVICE=/dev/video42 ./tools/scripts/modbus-v4l2-e2e.sh

      - name: ONNX infer E2E
        run: |
          chmod +x tools/scripts/onnx-infer-e2e.sh
          ./tools/scripts/onnx-infer-e2e.sh

      - name: Anomaly (OK-only) E2E + reports
        run: |
          chmod +x tools/scripts/anomaly-infer-e2e.sh tools/scripts/anomaly-reports.sh
          ./tools/scripts/anomaly-infer-e2e.sh
          ./tools/scripts/anomaly-reports.sh

      - name: Phase 1 synthetic capture smoke (sfi-capture)
        run: |
          chmod +x tools/scripts/phase1-smoke.sh
          ./tools/scripts/phase1-smoke.sh

  docker-demo-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker demo smoke
        run: |
          chmod +x tools/scripts/docker-demo-smoke.sh
          ./tools/scripts/docker-demo-smoke.sh

  julia-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - name: Julia project checks
        run: ./tools/scripts/julia-check.sh

      - uses: dtolnay/rust-toolchain@stable

      - name: Julia shm E2E
        run: ./tools/scripts/shm-julia-e2e.sh
