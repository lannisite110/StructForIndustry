# AOI template matching — coarse alignment / presence (Phase C)
name: line-inspect
domain: industrial-inspection
version: 0.0.1

scheduler:
  mode: realtime
  dropStaleFrames: true
  maxQueueDepth: 2
  defaultDeadlineMs: 50
  autoVision: true
  taskType: vision.inspect.template

vision:
  plugin: defect-detect
  threshold: 128
  roi:
    x: 0
    y: 0
    width: 1920
    height: 1080

calibration:
  mmPerPixel: 0.1

inspect:
  minScore: 0.8
  expectedX: 960.0
  expectedY: 540.0
  positionTolerance: 8.0
  search:
    x0: 400
    y0: 300
    x1: 1520
    y1: 780
  template:
    x: 940
    y: 520
    width: 32
    height: 32

spc:
  windowSize: 32
  persist: true
  metrics:
    - ncc_score
    - template_offset_x_px
    - template_offset_y_px
    - ng_rate

mes:
  enabled: false

compliance:
  auditConfigChanges: true
